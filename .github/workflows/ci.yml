# SPDX-License-Identifier: Apache-2.0
# Roamux CI baseline (roam-5 / plan §12.6 tier-1). GitHub-hosted, lint-only — NO Chromium build here.
# The heavy incremental build + gtest/browser_tests run on the self-hosted warm-cache builder (roam-36,
# deferred) or a nightly full gate. Fork/public PRs stay on this tier (no cache, no secrets).
name: ci
on:
  pull_request:
  push:
    branches: [main]
permissions:
  contents: read
jobs:
  lint:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - name: SPDX Apache-2.0 headers on roamux/ sources
        run: |
          missing=0
          while IFS= read -r f; do
            head -3 "$f" | grep -q 'SPDX-License-Identifier: Apache-2.0' \
              || { echo "::error file=$f::missing SPDX Apache-2.0 header"; missing=1; }
          # chromium_src/ holds full copies of upstream (BSD-licensed) files — they keep the
          # upstream header; the Roamux delta's licensing is documented inside each override.
          done < <(find roamux -type f \( -name '*.cc' -o -name '*.h' -o -name '*.mm' -o -name '*.gn' -o -name '*.gni' \) -not -path 'roamux/chromium_src/*')
          exit $missing
      - name: Build config sanity
        run: |
          test -f roamux/build/args/reference.gn || { echo "::error::missing reference.gn"; exit 1; }
          test -f roamux/BUILD.gn || { echo "::error::missing roamux/BUILD.gn"; exit 1; }
          echo "TODO(roam-5/roam-36): add 'gn format --dry-run' + the touched-target build+test once a"
          echo "Chromium checkout is available on the runner (self-hosted warm-cache tier, §12.6)."
      - name: Hermetic tooling tests (roam-2 — no Chromium checkout needed)
        run: python3 -m unittest discover -s roamux/build/tests -v
  governance:
    # roam-38 (§7.9): the CI MIRROR of the local hooks — runs the SAME checker scripts over the PR's
    # changed files (same --diff-filter=ACM as pre-commit) + commit-message syntax, so --no-verify
    # still fails at the PR. Fork-safe, no secrets, tier-1.
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Compute changed files (base..PR-head, ACM — matches the pre-commit hook)
        id: changed
        env:
          BASE: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          # Use the real PR head, NOT the checked-out synthetic merge commit (which is not Conventional).
          if [ -n "$BASE" ] && [ -n "$HEAD_SHA" ]; then
            git diff --name-only --diff-filter=ACM "$BASE...$HEAD_SHA" > changed.txt
          else
            git diff --name-only --diff-filter=ACM HEAD~1 HEAD > changed.txt   # push event
          fi
          echo "count=$(wc -l < changed.txt | tr -d ' ')" >> "$GITHUB_OUTPUT"
      - name: SPDX + secret-scan + overlay-structure (same scripts as the hook)
        run: |
          [ -s changed.txt ] || { echo "no changed files"; exit 0; }
          tr '\n' '\0' < changed.txt | xargs -0 python3 scripts/checks/spdx_header.py
          tr '\n' '\0' < changed.txt | xargs -0 python3 scripts/checks/secret_scan.py
          tr '\n' '\0' < changed.txt | xargs -0 python3 scripts/checks/overlay_structure.py
      - name: Conventional Commits (each PR commit subject — excludes the merge commit)
        if: github.event_name == 'pull_request'
        env:
          BASE: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          fail=0
          # base..head over the PR's OWN commits; the synthetic merge commit (HEAD) is not included.
          for sha in $(git rev-list "$BASE..$HEAD_SHA"); do
            git log -1 --format=%B "$sha" > /tmp/msg
            python3 scripts/checks/commit_msg.py /tmp/msg || fail=1
          done
          exit $fail

  targeted-suite:
    # ROAMUX_CHROMIUM_DEPENDENT (announce): visible tier-2 status for every PR — where the Chromium
    # work runs, or exactly why it is skipped. Never fails; the work happens on self-hosted (roam-36).
    runs-on: macos-14
    steps:
      - name: Tier-2 status (visible, never a silent green)
        env:
          CAP: ${{ vars.ROAMUX_CI_CHROMIUM_RUNNER }}
          IS_FORK: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.repo.fork }}
        run: |
          if [ "$IS_FORK" = "true" ]; then
            echo "tier-1 only: fork PR — self-hosted tier-2 is unreachable by design (R15)." | tee -a "$GITHUB_STEP_SUMMARY"
          elif [ -z "$CAP" ]; then
            echo "SKIPPED: no capable Chromium runner provisioned (roam-36 not enabled)." | tee -a "$GITHUB_STEP_SUMMARY"
          else
            echo "tier-2 runs on the self-hosted runner '$CAP' — see the targeted-suite-selfhosted job." | tee -a "$GITHUB_STEP_SUMMARY"
          fi

  targeted-suite-selfhosted:
    # ROAMUX_CHROMIUM_DEPENDENT: the tier-2 warm-base build + Roamux suites (roam-36, §12.6).
    # Trust predicate enumerated exactly (no non-PR catch-all): protected-main pushes OR same-repo
    # (non-fork) PRs — code someone with push rights already chose to push. Tighten to
    # protected-refs/merge-queue if this repo ever gains outside collaborators.
    if: ${{ vars.ROAMUX_CI_CHROMIUM_RUNNER != '' && ((github.event_name == 'push' && github.ref == 'refs/heads/main') || (github.event_name == 'pull_request' && github.event.pull_request.head.repo.fork == false)) }}
    runs-on: [self-hosted, macos, chromium-builder]
    steps:
      - uses: actions/checkout@v4
      - name: Warm-base incremental build + Roamux suites
        run: bash roamux/build/ci/tier2_job.sh
