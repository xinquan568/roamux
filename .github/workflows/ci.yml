# SPDX-License-Identifier: Apache-2.0
# Roamex CI baseline (roam-5 / plan §12.6 tier-1). GitHub-hosted, lint-only — NO Chromium build here.
# The heavy incremental build + gtest/browser_tests run on the self-hosted warm-cache builder (roam-36,
# deferred) or a nightly full gate. Fork/public PRs stay on this tier (no cache, no secrets).
name: ci
on:
  pull_request:
  push:
    branches: [main]
permissions:
  contents: read
jobs:
  lint:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - name: SPDX Apache-2.0 headers on roamex/ sources
        run: |
          missing=0
          while IFS= read -r f; do
            head -3 "$f" | grep -q 'SPDX-License-Identifier: Apache-2.0' \
              || { echo "::error file=$f::missing SPDX Apache-2.0 header"; missing=1; }
          # chromium_src/ holds full copies of upstream (BSD-licensed) files — they keep the
          # upstream header; the Roamex delta's licensing is documented inside each override.
          done < <(find roamex -type f \( -name '*.cc' -o -name '*.h' -o -name '*.mm' -o -name '*.gn' -o -name '*.gni' \) -not -path 'roamex/chromium_src/*')
          exit $missing
      - name: Build config sanity
        run: |
          test -f roamex/build/args/reference.gn || { echo "::error::missing reference.gn"; exit 1; }
          test -f roamex/BUILD.gn || { echo "::error::missing roamex/BUILD.gn"; exit 1; }
          echo "TODO(roam-5/roam-36): add 'gn format --dry-run' + the touched-target build+test once a"
          echo "Chromium checkout is available on the runner (self-hosted warm-cache tier, §12.6)."
      - name: Hermetic tooling tests (roam-2 — no Chromium checkout needed)
        run: python3 -m unittest discover -s roamex/build/tests -v
  targeted-suite:
    # ROAMEX_CHROMIUM_DEPENDENT (announce): visible tier-2 status for every PR — where the Chromium
    # work runs, or exactly why it is skipped. Never fails; the work happens on self-hosted (roam-36).
    runs-on: macos-14
    steps:
      - name: Tier-2 status (visible, never a silent green)
        env:
          CAP: ${{ vars.ROAMEX_CI_CHROMIUM_RUNNER }}
          IS_FORK: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.repo.fork }}
        run: |
          if [ "$IS_FORK" = "true" ]; then
            echo "tier-1 only: fork PR — self-hosted tier-2 is unreachable by design (R15)." | tee -a "$GITHUB_STEP_SUMMARY"
          elif [ -z "$CAP" ]; then
            echo "SKIPPED: no capable Chromium runner provisioned (roam-36 not enabled)." | tee -a "$GITHUB_STEP_SUMMARY"
          else
            echo "tier-2 runs on the self-hosted runner '$CAP' — see the targeted-suite-selfhosted job." | tee -a "$GITHUB_STEP_SUMMARY"
          fi

  targeted-suite-selfhosted:
    # ROAMEX_CHROMIUM_DEPENDENT: the tier-2 warm-base build + Roamex suites (roam-36, §12.6).
    # Trust predicate enumerated exactly (no non-PR catch-all): protected-main pushes OR same-repo
    # (non-fork) PRs — code someone with push rights already chose to push. Tighten to
    # protected-refs/merge-queue if this repo ever gains outside collaborators.
    if: ${{ vars.ROAMEX_CI_CHROMIUM_RUNNER != '' && ((github.event_name == 'push' && github.ref == 'refs/heads/main') || (github.event_name == 'pull_request' && github.event.pull_request.head.repo.fork == false)) }}
    runs-on: [self-hosted, macos, chromium-builder]
    steps:
      - uses: actions/checkout@v4
      - name: Warm-base incremental build + Roamex suites
        run: bash roamex/build/ci/tier2_job.sh
