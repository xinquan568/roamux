# SPDX-License-Identifier: Apache-2.0
# Roamux release pipeline (roam-33 / §12.6 tier-3). Secrets live ONLY in the
# protected `release` Environment (gated to protected refs + v* tags). Builds
# universal2, resolves the signing mode (all Apple secrets -> signed; none ->
# deliberate unsigned personal-alpha; partial -> fail-fast), signs inside-out
# (Chromium helpers -> Sparkle framework+XPC same Team ID -> outer app last),
# notarizes + staples, and packages .dmg/.zip. Appcast/sign_update/publish is
# roam-34 (I-6.3). The universal2 build runs only on the provisioned
# self-hosted release builder; without it the job fails LOUDLY (no silent
# skip into a broken sign step).
name: release
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
permissions:
  contents: write  # roam-34: gh release create/edit/upload
jobs:
  build-sign-package:
    runs-on: [self-hosted, macos, chromium-builder]
    environment: release
    env:
      CHROMIUM_SRC: ${{ github.workspace }}/chromium/src
    steps:
      - name: Assert protected ref
        run: |
          case "${GITHUB_REF}" in
            refs/tags/v*) echo "ref OK: ${GITHUB_REF}" ;;
            *) echo "::error::release ran on a non-release ref: ${GITHUB_REF}"; exit 1 ;;
          esac

      - name: Checkout overlay
        uses: actions/checkout@v4

      - name: Vendor Sparkle (pinned + hash-verified)
        run: python3 roamux/build/fetch_sparkle.py

      - name: Resolve signing mode
        id: mode
        env:
          ROAMEX_DEVELOPER_ID_CERT_P12: ${{ secrets.ROAMEX_DEVELOPER_ID_CERT_P12 }}
          ROAMEX_DEVELOPER_ID_CERT_PASSWORD: ${{ secrets.ROAMEX_DEVELOPER_ID_CERT_PASSWORD }}
          ROAMEX_NOTARY_KEY_ID: ${{ secrets.ROAMEX_NOTARY_KEY_ID }}
          ROAMEX_NOTARY_ISSUER_ID: ${{ secrets.ROAMEX_NOTARY_ISSUER_ID }}
          ROAMEX_NOTARY_PRIVATE_KEY: ${{ secrets.ROAMEX_NOTARY_PRIVATE_KEY }}
        run: |
          # Preserve the gate's non-zero exit (partial secrets -> fail-fast);
          # a bare $() in an echo would mask it.
          MODE="$(python3 roamux/app/release/signing_mode.py)"
          echo "signing mode: ${MODE}"
          echo "mode=${MODE}" >> "$GITHUB_OUTPUT"

      - name: Build universal2 Roamux.app
        run: |
          set -euo pipefail
          symlink="${CHROMIUM_SRC}/roamux"
          ln -sfn "$(pwd)/roamux" "$symlink"
          python3 "${CHROMIUM_SRC}/roamux/build/apply_patches.py" --chromium-src "${CHROMIUM_SRC}"
          args="$(tr '\n' ' ' < roamux/build/args/release.gn)"
          for cpu in arm64 x64; do
            ( cd "${CHROMIUM_SRC}" && gn gen "out/Release-${cpu}" --args="${args} target_cpu=\"${cpu}\"" )
            autoninja -C "${CHROMIUM_SRC}/out/Release-${cpu}" chrome
          done
          python3 "${CHROMIUM_SRC}/chrome/installer/mac/universalizer.py" \
            "${CHROMIUM_SRC}/out/Release-arm64/Chromium.app" \
            "${CHROMIUM_SRC}/out/Release-x64/Chromium.app" \
            "${CHROMIUM_SRC}/out/Release/Chromium.app"
          python3 roamux/app/release/rename_bundle.py --app "${CHROMIUM_SRC}/out/Release/Chromium.app"
          app="${CHROMIUM_SRC}/out/Release/Roamux.app"
          archs="$(lipo -archs "${app}/Contents/MacOS/Roamux")"
          echo "universal2 archs: ${archs}"
          case "${archs}" in
            *x86_64*arm64*|*arm64*x86_64*) echo "universal2 OK" ;;
            *) echo "::error::not universal2: ${archs}"; exit 1 ;;
          esac
          echo "ROAMUX_APP=${app}" >> "$GITHUB_ENV"

      - name: Set up keychain + sign + notarize + staple (signed mode)
        if: steps.mode.outputs.mode == 'signed'
        env:
          ROAMEX_DEVELOPER_ID_CERT_P12: ${{ secrets.ROAMEX_DEVELOPER_ID_CERT_P12 }}
          ROAMEX_DEVELOPER_ID_CERT_PASSWORD: ${{ secrets.ROAMEX_DEVELOPER_ID_CERT_PASSWORD }}
          ROAMEX_NOTARY_KEY_ID: ${{ secrets.ROAMEX_NOTARY_KEY_ID }}
          ROAMEX_NOTARY_ISSUER_ID: ${{ secrets.ROAMEX_NOTARY_ISSUER_ID }}
          ROAMEX_NOTARY_PRIVATE_KEY: ${{ secrets.ROAMEX_NOTARY_PRIVATE_KEY }}
        run: |
          bash roamux/app/release/keychain_setup.sh
          # Same-step: $GITHUB_ENV is not yet visible here, so source the file.
          source "${RUNNER_TEMP}/roamux-signing/env.sh"
          python3 roamux/app/release/sign_roamux.py \
            --mode signed \
            --app "${ROAMUX_APP}" \
            --identity "${ROAMEX_SIGN_IDENTITY}" \
            --notary-key "${ROAMEX_NOTARY_KEY_PATH}" \
            --notary-key-id "${ROAMEX_NOTARY_KEY_ID}" \
            --notary-issuer "${ROAMEX_NOTARY_ISSUER_ID}"

      - name: Verify signed artifact (signed mode)
        if: steps.mode.outputs.mode == 'signed'
        run: |
          codesign --verify --strict --deep --verbose=2 "${ROAMUX_APP}"
          xcrun stapler validate "${ROAMUX_APP}"
          spctl --assess --type execute --verbose=4 "${ROAMUX_APP}"

      - name: Log unsigned artifact state (unsigned mode)
        if: steps.mode.outputs.mode == 'unsigned'
        run: python3 roamux/app/release/sign_roamux.py --mode unsigned --app "${ROAMUX_APP}"

      - name: Package .dmg / .zip
        run: |
          python3 roamux/app/release/package_roamux.py \
            --app "${ROAMUX_APP}" \
            --zip "${CHROMIUM_SRC}/out/Release/Roamux.zip" \
            --dmg "${CHROMIUM_SRC}/out/Release/Roamux.dmg"

      # --- roam-34: the update leg. The Sparkle EdDSA signature is required in
      # EVERY mode (K3) — gated on the Sparkle key's presence, NOT the Apple
      # signing mode. A release without the Sparkle key hard-fails.
      - name: Sign updates + generate appcast (every mode)
        env:
          SPARKLE_ED_PRIVATE_KEY: ${{ secrets.SPARKLE_ED_PRIVATE_KEY }}
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          keyfile="${RUNNER_TEMP}/sparkle_ed_priv"
          trap 'rm -f "$keyfile"' EXIT   # remove the key on any exit path
          printf '%s' "${SPARKLE_ED_PRIVATE_KEY:?Sparkle EdDSA key required for every release (K3)}" > "$keyfile"
          chmod 600 "$keyfile"
          bin="roamux/third_party/sparkle/bin/sign_update"
          rel="${CHROMIUM_SRC}/out/Release"
          # Sign the FINAL artifacts (byte-exact), then build the appcast whose
          # enclosure url is the per-tag artifact download URL.
          for art in Roamux.zip Roamux.dmg; do
            sig="$(python3 roamux/app/appcast/sign_update_wrapper.py               --sign-update-bin "$bin" --artifact "$rel/$art" --key-file "$keyfile")"
            [ "$art" = "Roamux.zip" ] && ZIP_SIG="$sig"
          done
          url="https://github.com/xinquan568/roamex/releases/download/${TAG}/Roamux.zip"
          python3 roamux/app/appcast/generate_appcast.py             --version "${TAG#v}" --enclosure-url "$url"             --artifact "$rel/Roamux.zip" --ed-signature "$ZIP_SIG"             --pub-date "$(date -u '+%a, %d %b %Y %H:%M:%S +0000')"             --out "$rel/appcast.xml"
          rm -f "$keyfile"

      - name: Create DRAFT release + staging-validate the DOWNLOADED assets
        env:
          GH_TOKEN: ${{ github.token }}
          SPARKLE_ED_PRIVATE_KEY: ${{ secrets.SPARKLE_ED_PRIVATE_KEY }}
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          rel="${CHROMIUM_SRC}/out/Release"
          bindir="roamux/third_party/sparkle/bin"
          acct="roamux-release-verify"
          keyfile="${RUNNER_TEMP}/sparkle_ed_priv_verify"
          # Import the signing key into a keychain account for Sparkle's own
          # verifier; remove it (and the temp key) on every exit path.
          trap 'security delete-generic-password -s "https://sparkle-project.org" -a "$acct" >/dev/null 2>&1 || true; rm -f "$keyfile"' EXIT
          printf '%s' "$SPARKLE_ED_PRIVATE_KEY" > "$keyfile"
          chmod 600 "$keyfile"
          "$bindir/generate_keys" --account "$acct" -f "$keyfile"
          # Draft, non-prerelease; assets get per-tag download URLs.
          gh release create "$TAG" --draft --prerelease=false \
            --title "Roamux ${TAG}" --notes "Roamux ${TAG}" \
            "$rel/Roamux.dmg" "$rel/Roamux.zip" "$rel/appcast.xml"
          # K2: validate the ACTUAL DRAFT ASSETS, not the local files — download
          # the appcast + artifact from the draft and verify those bytes against
          # the committed SUPublicEDKey via Sparkle's verifier, before publish.
          dl="${RUNNER_TEMP}/roamux-staging"
          mkdir -p "$dl"
          gh release download "$TAG" --pattern 'appcast.xml' \
            --pattern 'Roamux.zip' --dir "$dl" --clobber
          python3 roamux/app/appcast/verify_appcast.py \
            --appcast "$dl/appcast.xml" --artifact "$dl/Roamux.zip" \
            --public-key-plist roamux/app/sparkle-Info.plist \
            --sparkle-bin-dir "$bindir" --account "$acct"

      - name: Publish (only after staging validation)
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
        run: |
          # --latest so the production /releases/latest/download/appcast.xml
          # feed (SUFeedURL) resolves to this release (K2, roam-32).
          gh release edit "$TAG" --draft=false --prerelease=false --latest

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: roamux-macos-universal2
          path: |
            ${{ env.CHROMIUM_SRC }}/out/Release/Roamux.dmg
            ${{ env.CHROMIUM_SRC }}/out/Release/Roamux.zip
            ${{ env.CHROMIUM_SRC }}/out/Release/appcast.xml

      - name: Remove signing material
        if: always()
        run: bash roamux/app/release/keychain_cleanup.sh
