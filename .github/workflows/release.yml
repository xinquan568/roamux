# SPDX-License-Identifier: Apache-2.0
# Roamux release pipeline (roam-33 / §12.6 tier-3). Secrets live ONLY in the
# protected `release` Environment (gated to protected refs + v* tags). Builds
# universal2, resolves the signing mode (all Apple secrets -> signed; none ->
# deliberate unsigned personal-alpha; partial -> fail-fast), signs inside-out
# (Chromium helpers -> Sparkle framework+XPC same Team ID -> outer app last),
# notarizes + staples, and packages .dmg/.zip. Appcast/sign_update/publish is
# roam-34 (I-6.3). The universal2 build runs only on the provisioned
# self-hosted release builder; without it the job fails LOUDLY (no silent
# skip into a broken sign step). Machine paths (the Chromium checkout,
# depot_tools) resolve from the runner machine-env file contract
# (~/roamux-runner/.env, roam-108) — never from the workspace.
name: release
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
permissions:
  contents: write  # roam-34: gh release create/edit/upload
jobs:
  build-sign-package:
    runs-on: [self-hosted, macos, chromium-builder]
    environment: release
    # roam-110: GitHub's silent default job timeout is 6h even on self-hosted runners; a cold
    # universal2 build exceeds it (run 29195822447 was service-cancelled at exactly 6h00m).
    timeout-minutes: 1440
    steps:
      - name: Assert protected ref
        run: |
          case "${GITHUB_REF}" in
            refs/tags/v*) echo "ref OK: ${GITHUB_REF}" ;;
            *) echo "::error::release ran on a non-release ref: ${GITHUB_REF}"; exit 1 ;;
          esac

      - name: Resolve machine env (v1 builder contract, roam-108)
        run: |
          set -euo pipefail
          # The machine-env file contract (docs/ci/self-hosted-runner.md): required, sourced
          # unconditionally, every value validated. The actions-runner also injects it into
          # job envs, but injection is background behavior — the checks below are the contract.
          env_file="${HOME}/roamux-runner/.env"
          if [ ! -f "${env_file}" ]; then
            echo "::error::machine-env contract unsatisfied: ${env_file} not found (docs/ci/self-hosted-runner.md)"; exit 1
          fi
          set -a; . "${env_file}"; set +a
          if [ -z "${ROAMUX_CHROMIUM_SRC:-}" ]; then
            echo "::error::ROAMUX_CHROMIUM_SRC missing/empty in ${env_file} — write it per docs/ci/self-hosted-runner.md"; exit 1
          fi
          if [ ! -d "${ROAMUX_CHROMIUM_SRC}" ]; then
            echo "::error::ROAMUX_CHROMIUM_SRC=${ROAMUX_CHROMIUM_SRC} is not a directory on this builder"; exit 1
          fi
          if [ -z "${ROAMUX_DEPOT_TOOLS:-}" ]; then
            echo "::error::ROAMUX_DEPOT_TOOLS missing/empty in ${env_file} — write it per docs/ci/self-hosted-runner.md"; exit 1
          fi
          if [ ! -d "${ROAMUX_DEPOT_TOOLS}" ]; then
            echo "::error::ROAMUX_DEPOT_TOOLS=${ROAMUX_DEPOT_TOOLS} is not a directory on this builder"; exit 1
          fi
          echo "CHROMIUM_SRC=${ROAMUX_CHROMIUM_SRC}" >> "$GITHUB_ENV"
          echo "${ROAMUX_DEPOT_TOOLS}" >> "$GITHUB_PATH"
          echo "resolved: CHROMIUM_SRC=${ROAMUX_CHROMIUM_SRC}; depot_tools on PATH from ${ROAMUX_DEPOT_TOOLS}"

      - name: Checkout overlay
        uses: actions/checkout@v4

      - name: Vendor Sparkle (pinned + hash-verified)
        run: python3 roamux/build/fetch_sparkle.py

      - name: Resolve signing mode
        id: mode
        env:
          ROAMUX_DEVELOPER_ID_CERT_P12: ${{ secrets.ROAMUX_DEVELOPER_ID_CERT_P12 }}
          ROAMUX_DEVELOPER_ID_CERT_PASSWORD: ${{ secrets.ROAMUX_DEVELOPER_ID_CERT_PASSWORD }}
          ROAMUX_NOTARY_KEY_ID: ${{ secrets.ROAMUX_NOTARY_KEY_ID }}
          ROAMUX_NOTARY_ISSUER_ID: ${{ secrets.ROAMUX_NOTARY_ISSUER_ID }}
          ROAMUX_NOTARY_PRIVATE_KEY: ${{ secrets.ROAMUX_NOTARY_PRIVATE_KEY }}
        run: |
          # Preserve the gate's non-zero exit (partial secrets -> fail-fast);
          # a bare $() in an echo would mask it.
          MODE="$(python3 roamux/app/release/signing_mode.py)"
          echo "signing mode: ${MODE}"
          echo "mode=${MODE}" >> "$GITHUB_OUTPUT"

      - name: Build universal2 Roamux.app
        run: |
          set -euo pipefail
          symlink="${CHROMIUM_SRC}/roamux"
          ln -sfn "$(pwd)/roamux" "$symlink"
          python3 "${CHROMIUM_SRC}/roamux/build/apply_patches.py" --chromium-src "${CHROMIUM_SRC}"
          # roam-132: rebrand user-visible "Chromium" -> "Roamux" across the GRIT string
          # sources + locale xtb (governed channel §12.2, like apply_patches) — AFTER the
          # patches and BEFORE the grit/resource compile (autoninja below) so the compiled
          # .pak strings carry the product name. Then the post-substitution validation gate:
          # a representative product string rebranded, legal/attribution intact, and the
          # channel idempotent (--check clean). Fail the release otherwise.
          python3 "${CHROMIUM_SRC}/roamux/build/rebrand_strings.py" --chromium-src "${CHROMIUM_SRC}"
          rebrand_grd="${CHROMIUM_SRC}/chrome/app/chromium_strings.grd"
          grep -q "Roamux" "$rebrand_grd" \
            || { echo "::error::rebrand gate: no user-visible 'Roamux' in chromium_strings.grd"; exit 1; }
          grep -q "The Chromium Authors" "$rebrand_grd" \
            || { echo "::error::rebrand gate: legal attribution 'The Chromium Authors' was lost"; exit 1; }
          python3 "${CHROMIUM_SRC}/roamux/build/rebrand_strings.py" --chromium-src "${CHROMIUM_SRC}" --check \
            || { echo "::error::rebrand gate: --check still reports un-rebranded user-visible strings"; exit 1; }
          # roam-114: pass args via import() — NEVER newline-flatten the args file (its first
          # '#' would comment out every arg on the single flattened line). The overlay symlink
          # above makes //roamux/... resolve inside the checkout.
          for cpu in arm64 x64; do
            ( cd "${CHROMIUM_SRC}" && gn gen "out/Release-${cpu}" --args="import(\"//roamux/build/args/release.gn\") target_cpu=\"${cpu}\"" )
            # Canary BEFORE the hours-long compile: the imported args must have taken effect.
            ( cd "${CHROMIUM_SRC}" && gn args "out/Release-${cpu}" --list=is_official_build --short ) | grep -qx 'is_official_build = true' \
              || { echo "::error::GN args not applied in slice ${cpu} (is_official_build != true)"; exit 1; }
            autoninja -C "${CHROMIUM_SRC}/out/Release-${cpu}" chrome
            want="${cpu}"; [ "${want}" = "x64" ] && want="x86_64"
            slice_archs="$(lipo -archs "${CHROMIUM_SRC}/out/Release-${cpu}/Chromium.app/Contents/MacOS/Chromium")"
            [ "${slice_archs}" = "${want}" ] \
              || { echo "::error::slice ${cpu} built archs '${slice_archs}', expected '${want}' — args/toolchain rot"; exit 1; }
          done
          # roam-112: the universalizer os.mkdir()s its output bundle and needs the PARENT to
          # exist (a fresh builder has no out/Release); a stale Chromium.app from an interrupted
          # prior run would also make that mkdir fail, so clear it (rename_bundle already
          # self-heals a stale Roamux.app).
          mkdir -p "${CHROMIUM_SRC}/out/Release"
          rm -rf "${CHROMIUM_SRC}/out/Release/Chromium.app"
          python3 "${CHROMIUM_SRC}/chrome/installer/mac/universalizer.py" \
            "${CHROMIUM_SRC}/out/Release-arm64/Chromium.app" \
            "${CHROMIUM_SRC}/out/Release-x64/Chromium.app" \
            "${CHROMIUM_SRC}/out/Release/Chromium.app"
          # roam-141: Sparkle only orders NUMERIC versions, so stamp the numeric
          # encoding as CFBundleVersion (the value Sparkle compares); the human
          # string rides the appcast's shortVersionString.
          bundle_ver="$(python3 roamux/build/release_version.py --tag "${GITHUB_REF_NAME}" --field bundle)"
          python3 roamux/app/release/rename_bundle.py --app "${CHROMIUM_SRC}/out/Release/Chromium.app" --bundle-version "${bundle_ver}"
          app="${CHROMIUM_SRC}/out/Release/Roamux.app"
          archs="$(lipo -archs "${app}/Contents/MacOS/Roamux")"
          echo "universal2 archs: ${archs}"
          case "${archs}" in
            *x86_64*arm64*|*arm64*x86_64*) echo "universal2 OK" ;;
            *) echo "::error::not universal2: ${archs}"; exit 1 ;;
          esac
          echo "ROAMUX_APP=${app}" >> "$GITHUB_ENV"

      # roam-103: the final universal, renamed bundle must carry the bold-X icon payloads on both
      # channels (app.icns + Assets.car) BEFORE it is signed and packaged.
      - name: Icon gate — final universal Roamux.app carries the bold-X payloads
        run: python3 roamux/build/check_app_icon.py --app "${ROAMUX_APP}" --repo "$(pwd)/roamux"

      # roam-121: the stub dlopen()s the framework at first launch; every @rpath dependency
      # of the framework (Sparkle) must resolve via its own LC_RPATHs to a file inside the
      # bundle — gate it here in seconds, never on a user's Mac.
      - name: Framework rpath gate — @rpath deps resolve inside the bundle
        run: python3 roamux/build/check_framework_rpath.py --app "${ROAMUX_APP}"

      - name: Set up keychain + sign + notarize + staple (signed mode)
        if: steps.mode.outputs.mode == 'signed'
        env:
          ROAMUX_DEVELOPER_ID_CERT_P12: ${{ secrets.ROAMUX_DEVELOPER_ID_CERT_P12 }}
          ROAMUX_DEVELOPER_ID_CERT_PASSWORD: ${{ secrets.ROAMUX_DEVELOPER_ID_CERT_PASSWORD }}
          ROAMUX_NOTARY_KEY_ID: ${{ secrets.ROAMUX_NOTARY_KEY_ID }}
          ROAMUX_NOTARY_ISSUER_ID: ${{ secrets.ROAMUX_NOTARY_ISSUER_ID }}
          ROAMUX_NOTARY_PRIVATE_KEY: ${{ secrets.ROAMUX_NOTARY_PRIVATE_KEY }}
        run: |
          bash roamux/app/release/keychain_setup.sh
          # Same-step: $GITHUB_ENV is not yet visible here, so source the file.
          source "${RUNNER_TEMP}/roamux-signing/env.sh"
          python3 roamux/app/release/sign_roamux.py \
            --mode signed \
            --app "${ROAMUX_APP}" \
            --identity "${ROAMUX_SIGN_IDENTITY}" \
            --notary-key "${ROAMUX_NOTARY_KEY_PATH}" \
            --notary-key-id "${ROAMUX_NOTARY_KEY_ID}" \
            --notary-issuer "${ROAMUX_NOTARY_ISSUER_ID}"

      - name: Verify signed artifact (signed mode)
        if: steps.mode.outputs.mode == 'signed'
        run: |
          codesign --verify --strict --deep --verbose=2 "${ROAMUX_APP}"
          xcrun stapler validate "${ROAMUX_APP}"
          spctl --assess --type execute --verbose=4 "${ROAMUX_APP}"

      - name: Log unsigned artifact state (unsigned mode)
        if: steps.mode.outputs.mode == 'unsigned'
        run: python3 roamux/app/release/sign_roamux.py --mode unsigned --app "${ROAMUX_APP}"

      - name: Package .dmg / .zip
        run: |
          python3 roamux/app/release/package_roamux.py \
            --app "${ROAMUX_APP}" \
            --zip "${CHROMIUM_SRC}/out/Release/Roamux.zip" \
            --dmg "${CHROMIUM_SRC}/out/Release/Roamux.dmg"

      # --- roam-34: the update leg. The Sparkle EdDSA signature is required in
      # EVERY mode (K3) — gated on the Sparkle key's presence, NOT the Apple
      # signing mode. A release without the Sparkle key hard-fails.
      - name: Sign updates + generate appcast (every mode)
        env:
          SPARKLE_ED_PRIVATE_KEY: ${{ secrets.SPARKLE_ED_PRIVATE_KEY }}
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          keyfile="${RUNNER_TEMP}/sparkle_ed_priv"
          trap 'rm -f "$keyfile"' EXIT   # remove the key on any exit path
          printf '%s' "${SPARKLE_ED_PRIVATE_KEY:?Sparkle EdDSA key required for every release (K3)}" > "$keyfile"
          chmod 600 "$keyfile"
          bin="roamux/third_party/sparkle/bin/sign_update"
          rel="${CHROMIUM_SRC}/out/Release"
          # Sign the FINAL artifacts (byte-exact), then build the appcast whose
          # enclosure url is the per-tag artifact download URL.
          for art in Roamux.zip Roamux.dmg; do
            sig="$(python3 roamux/app/appcast/sign_update_wrapper.py               --sign-update-bin "$bin" --artifact "$rel/$art" --key-file "$keyfile")"
            [ "$art" = "Roamux.zip" ] && ZIP_SIG="$sig"
          done
          url="https://github.com/xinquan568/roamux/releases/download/${TAG}/Roamux.zip"
          # roam-141: sparkle:version = the numeric (Sparkle-orderable) encoding, matching the
          # stamped CFBundleVersion; shortVersionString = the human tag string for the dialog.
          appcast_ver="$(python3 roamux/build/release_version.py --tag "${TAG}" --field bundle)"
          appcast_short="$(python3 roamux/build/release_version.py --tag "${TAG}" --field short)"
          python3 roamux/app/appcast/generate_appcast.py             --version "${appcast_ver}" --short-version "${appcast_short}" --enclosure-url "$url"             --artifact "$rel/Roamux.zip" --ed-signature "$ZIP_SIG"             --pub-date "$(date -u '+%a, %d %b %Y %H:%M:%S +0000')"             --out "$rel/appcast.xml"
          rm -f "$keyfile"

      - name: Create DRAFT release + staging-validate the DOWNLOADED assets
        env:
          GH_TOKEN: ${{ github.token }}
          SPARKLE_ED_PRIVATE_KEY: ${{ secrets.SPARKLE_ED_PRIVATE_KEY }}
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          rel="${CHROMIUM_SRC}/out/Release"
          bindir="roamux/third_party/sparkle/bin"
          acct="roamux-release-verify"
          keyfile="${RUNNER_TEMP}/sparkle_ed_priv_verify"
          # Import the signing key into a keychain account for Sparkle's own
          # verifier; remove it (and the temp key) on every exit path.
          trap 'security delete-generic-password -s "https://sparkle-project.org" -a "$acct" >/dev/null 2>&1 || true; rm -f "$keyfile"' EXIT
          printf '%s' "$SPARKLE_ED_PRIVATE_KEY" > "$keyfile"
          chmod 600 "$keyfile"
          "$bindir/generate_keys" --account "$acct" -f "$keyfile"
          # Re-cut safety (roam-124): a prior release on this tag makes create() spawn a
          # SECOND draft while an edit-by-tag would publish the OLD release. Delete the
          # predecessor (the re-pointed tag orphaned it anyway) so the tag is unambiguous
          # for the staging download, and track OUR draft by id for the publish step.
          # gh api prints the 404 error BODY to stdout (--jq unapplied) while exiting
          # nonzero (roam-126) — gate the capture on the exit code, never the output,
          # and refuse a non-numeric id outright.
          prior=""
          if out=$(gh api "repos/${GITHUB_REPOSITORY}/releases/tags/${TAG}" --jq .id 2>/dev/null); then
            prior="${out}"
          fi
          case "${prior}" in
            *[!0-9]*) echo "::error::unexpected prior-release id '${prior}'"; exit 1 ;;
          esac
          if [ -n "${prior}" ]; then
            echo "re-cut: deleting prior release ${prior} for ${TAG}"
            gh api -X DELETE "repos/${GITHUB_REPOSITORY}/releases/${prior}"
          fi
          # Draft, non-prerelease; assets get per-tag download URLs.
          gh release create "$TAG" --draft --prerelease=false \
            --title "Roamux ${TAG}" --notes "Roamux ${TAG}" \
            "$rel/Roamux.dmg" "$rel/Roamux.zip" "$rel/appcast.xml"
          release_id=$(gh api "repos/${GITHUB_REPOSITORY}/releases" \
            --jq "[.[] | select(.tag_name == \"${TAG}\" and .draft)][0].id // empty")
          if [ -z "${release_id}" ]; then
            echo "::error::draft release id not found for ${TAG}"; exit 1
          fi
          echo "RELEASE_ID=${release_id}" >> "$GITHUB_ENV"
          # K2: validate the ACTUAL DRAFT ASSETS, not the local files — download
          # the appcast + artifact from the draft and verify those bytes against
          # the committed SUPublicEDKey via Sparkle's verifier, before publish.
          dl="${RUNNER_TEMP}/roamux-staging"
          mkdir -p "$dl"
          gh release download "$TAG" --pattern 'appcast.xml' \
            --pattern 'Roamux.zip' --dir "$dl" --clobber
          python3 roamux/app/appcast/verify_appcast.py \
            --appcast "$dl/appcast.xml" --artifact "$dl/Roamux.zip" \
            --public-key-plist roamux/app/sparkle-Info.plist \
            --sparkle-bin-dir "$bindir" --account "$acct"

      - name: Publish (only after staging validation)
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
        run: |
          # make_latest so the production /releases/latest/download/appcast.xml
          # feed (SUFeedURL) resolves to this release (K2, roam-32). PATCH by id —
          # edit-by-tag can hit a different release on a re-cut (roam-124).
          gh api -X PATCH "repos/${GITHUB_REPOSITORY}/releases/${RELEASE_ID}" \
            -F draft=false -F prerelease=false -f make_latest=true --jq .html_url

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: roamux-macos-universal2
          path: |
            ${{ env.CHROMIUM_SRC }}/out/Release/Roamux.dmg
            ${{ env.CHROMIUM_SRC }}/out/Release/Roamux.zip
            ${{ env.CHROMIUM_SRC }}/out/Release/appcast.xml

      - name: Remove signing material
        if: always()
        run: bash roamux/app/release/keychain_cleanup.sh
