# git-cliff config (roam-40, §7.9). Renders CHANGELOG.md from Conventional-Commit history — coherent
# because roam-38 ENFORCES Conventional Commits. Groups cover roam-38's exact enforced type set.
[changelog]
header = "# Changelog\n\nAll notable changes to Roamux. Generated from Conventional-Commit history by git-cliff.\n"
body = """
{% if version %}## [{{ version }}] - {{ timestamp | date(format="%Y-%m-%d") }}{% else %}## [unreleased]{% endif %}
{% for group, commits in commits | group_by(attribute="group") %}
### {{ group | upper_first }}
{% for commit in commits %}
- {{ commit.message | upper_first }}{% endfor %}
{% endfor %}
"""
trim = true

[git]
conventional_commits = true
filter_unconventional = true
tag_pattern = "v[0-9]*"
commit_parsers = [
  { message = "^feat", group = "Features" },
  { message = "^fix", group = "Bug Fixes" },
  { message = "^perf", group = "Performance" },
  { message = "^refactor", group = "Refactor" },
  { message = "^docs", group = "Documentation" },
  { message = "^test", group = "Testing" },
  { message = "^build", group = "Build & CI" },
  { message = "^ci", group = "Build & CI" },
  { message = "^style", group = "Chores" },
  { message = "^chore", group = "Chores" },
  { message = "^revert", group = "Reverts" },
]
