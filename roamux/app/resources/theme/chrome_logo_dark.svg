<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 512 512" role="img" aria-labelledby="title">
  <title id="title">Roamux</title>
  <!--
    roam-169: the Roamux glyph as the payload for upstream's
    ui/webui/resources/images/chrome_logo_dark.svg (patch 0038 replaces that file's
    content with exactly this file). The dark <source> of every default-slot
    cr-toolbar/cr-drawer <picture> (and contextual_tasks' dark <img>) resolves that
    URL, bypassing chrome://theme/current-channel-logo (roam-158) in dark mode.
    Fixed palette + transparent field -> identical art in light and dark, which is
    the issue's goal. Root width/height stay 24 (the upstream asset's intrinsic
    size; cr_toolbar/cr_drawer CSS pins 24x24 anyway). Geometry is roamux_glyph.svg
    (roam-157) unchanged; keep the two files' shapes in sync on any redesign —
    roamux/build/check_dark_logo.py enforces structure and patch sync.
  -->
  <mask id="roamuxGlyphHole" maskUnits="userSpaceOnUse" x="0" y="0" width="512" height="512" mask-type="luminance">
    <rect x="0" y="0" width="512" height="512" fill="#FFFFFF"/>
    <circle cx="256" cy="256" r="72" fill="#000000"/>
  </mask>
  <g mask="url(#roamuxGlyphHole)" fill="none" stroke-linecap="round" stroke-width="90.608">
    <line x1="219.230" y1="219.230" x2="107.508" y2="107.508" stroke="#EA4335"/>
    <line x1="292.770" y1="219.230" x2="404.492" y2="107.508" stroke="#FBBC05"/>
    <line x1="292.770" y1="292.770" x2="404.492" y2="404.492" stroke="#34A853"/>
    <line x1="219.230" y1="292.770" x2="107.508" y2="404.492" stroke="#4285F4"/>
  </g>
</svg>
